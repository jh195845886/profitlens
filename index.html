<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitLens — Etsy Profit Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, sans-serif; background: #0a0a0f; color: #e4e4ec; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .card { background: #13131a; border:1px solid #252532; border-radius:20px; padding:48px 32px; max-width:480px; }
  h1 { font-size:1.8rem; font-weight:800; background:linear-gradient(135deg,#f97316,#ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:12px; }
  p { color:#9090a8; line-height:1.6; }
  .email-box { background:#1a1a24; border:1px solid #252532; border-radius:10px; padding:12px 16px; margin:24px 0; }
  input { background:transparent; border:none; color:#e4e4ec; font-size:0.95rem; width:100%; outline:none; }
  button { background:linear-gradient(135deg,#f97316,#ef4444); color:#fff; border:none; padding:12px 28px; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
  button:hover { opacity:0.9; }
  .msg { margin-top:16px; font-size:0.9rem; }
  .msg.success { color:#22d172; }
  .msg.error { color:#ff4d6a; }
</style>
</head>
<body>
<div class="card">
  <h1>ProfitLens</h1>
  <p>Know your real Etsy profit. Connect your shop — we'll handle the math.<br>Launching soon.</p>
  <div class="email-box">
    <input type="email" id="emailInput" placeholder="Enter your email for early access">
  </div>
  <button onclick="handleSubmit()">Get Notified</button>
  <div class="msg" id="msg"></div>
</div>
<script>
function handleSubmit() {
  const email = document.getElementById('emailInput').value.trim();
  const msg = document.getElementById('msg');
  if (!email || !email.includes('@')) {
    msg.className = 'msg error';
    msg.textContent = 'Please enter a valid email address.';
    return;
  }
  // Save lead
  const leads = JSON.parse(localStorage.getItem('profitlensLeads') || '[]');
  leads.push({ email, date: new Date().toISOString() });
  localStorage.setItem('profitlensLeads', JSON.stringify(leads));
  msg.className = 'msg success';
  msg.textContent = '✓ You\'re on the list! We\'ll notify you when we launch.';
  document.getElementById('emailInput').value = '';
}
</script>
</body>
</html>
